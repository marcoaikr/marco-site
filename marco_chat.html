<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마르코 챗봇 — Pro 전용</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#09090b;--bg2:#111113;--bg3:#18181b;
--border:#27272a;--border2:#3f3f46;
--text:#fafafa;--text2:#a1a1aa;--text3:#71717a;
--purple:#8b5cf6;--purple2:#7c3aed;--purple-dim:#1e1b4b;
--green:#22c55e;
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  font-size:15px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:0 20px;
  height:56px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
}
.header-left{display:flex;align-items:center;gap:10px}
.header-status{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--green)}
.header-status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pro-badge{background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.3);color:#a78bfa;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;letter-spacing:.04em}

/* CHAT AREA */
.chat-area{
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:16px;
  scroll-behavior:smooth;
}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-track{background:transparent}
.chat-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* MESSAGES */
.msg{display:flex;gap:10px;align-items:flex-end;max-width:100%}
.msg.user{flex-direction:row-reverse}
.msg-avatar{
  width:32px;height:32px;
  border-radius:50%;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;
}
.msg-avatar.marco{background:var(--purple-dim);border:1px solid rgba(139,92,246,.3)}
.msg-avatar.user{background:var(--bg3);border:1px solid var(--border2);color:var(--text2)}
.msg-bubble{
  max-width:75%;
  padding:12px 16px;
  border-radius:16px;
  font-size:14px;
  line-height:1.7;
  word-break:keep-all;
}
.msg.marco .msg-bubble{
  background:var(--bg2);
  border:1px solid var(--border);
  border-bottom-left-radius:4px;
  color:var(--text);
}
.msg.user .msg-bubble{
  background:var(--purple);
  border-bottom-right-radius:4px;
  color:#fff;
}
.msg-time{font-size:10px;color:var(--text3);margin-bottom:2px;padding:0 4px}
.msg.user .msg-time{text-align:right}

/* TYPING INDICATOR */
.typing{display:flex;gap:4px;padding:14px 16px;align-items:center}
.typing-dot{
  width:6px;height:6px;
  border-radius:50%;
  background:var(--text3);
  animation:typing 1.2s infinite;
}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* QUICK QUESTIONS */
.quick-wrap{
  padding:0 20px 12px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  flex-shrink:0;
}
.quick-btn{
  background:var(--bg2);
  border:1px solid var(--border);
  color:var(--text2);
  padding:6px 12px;
  border-radius:99px;
  font-size:12px;
  cursor:pointer;
  transition:all .2s;
  white-space:nowrap;
  font-family:'Noto Sans KR',sans-serif;
}
.quick-btn:hover{border-color:var(--purple);color:var(--purple)}

/* INPUT AREA */
.input-area{
  padding:12px 16px;
  background:var(--bg2);
  border-top:1px solid var(--border);
  display:flex;
  gap:10px;
  align-items:flex-end;
  flex-shrink:0;
}
.input-wrap{
  flex:1;
  background:var(--bg3);
  border:1px solid var(--border2);
  border-radius:12px;
  padding:10px 14px;
  display:flex;
  align-items:flex-end;
  gap:8px;
  transition:border-color .2s;
}
.input-wrap:focus-within{border-color:var(--purple)}
#userInput{
  flex:1;
  background:none;
  border:none;
  outline:none;
  color:var(--text);
  font-size:14px;
  font-family:'Noto Sans KR',sans-serif;
  resize:none;
  max-height:120px;
  line-height:1.5;
}
#userInput::placeholder{color:var(--text3)}
.send-btn{
  width:34px;height:34px;
  border-radius:8px;
  background:var(--purple);
  border:none;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:background .2s,transform .1s;
  margin-bottom:1px;
}
.send-btn:hover{background:var(--purple2);transform:scale(1.05)}
.send-btn:disabled{background:var(--border2);cursor:not-allowed;transform:none}
.send-btn svg{width:16px;height:16px;fill:#fff}

/* NOTICE */
.notice{
  text-align:center;
  font-size:11px;
  color:var(--text3);
  padding:8px 20px 0;
  flex-shrink:0;
}

/* ERROR MSG */
.msg-bubble.error{
  background:rgba(248,113,113,.08);
  border-color:rgba(248,113,113,.2);
  color:#f87171;
}

@media(max-width:480px){
  .msg-bubble{max-width:88%}
  .quick-wrap{padding:0 12px 10px}
  .input-area{padding:10px 12px}
}
</style>
</head>

<script>
const SYSTEM_PROMPT = `당신은 마르코(MARCO)의 고객 지원 AI입니다. Pro 전용 채널에서 유료 이용자의 질문에 답변합니다.

[마르코 서비스 본질]
마르코는 대행사 담당자(AE, 마케터, 기획자)가 클라이언트의 마케팅 문제를 진단받는 서비스입니다.
마르코가 실제로 파는 것: "내가 하는 게 맞는지 모르겠다"는 불안에서 벗어나 클라이언트 앞에서 확신을 갖는 것.
마르코 = AI의 속도 + 마르코 팀의 판단. 자동 생성 리포트가 아닙니다.

[5가지 진단 프레임 — FC·TG·TR·MS·RT]
FC (유입채널): 타깃 고객이 자연스럽게 오는 경로가 있는가 / 선행지표: 오가닉 유입 비율, 채널별 CPC
TG (타깃): 올바른 사람에게 닿고 있는가 / 선행지표: 게시물 저장율, 프로필 방문율
TR (신뢰): 믿고 살 수 있다는 근거가 있는가 / 선행지표: 상세페이지 체류시간, 재방문율
MS (메시지): 왜 이 브랜드여야 하는가가 보이는가 / 선행지표: 광고 CTR, 게시물 저장율
RT (재구매): 한 번 산 사람이 다시 오는 구조가 있는가 / 선행지표: 30일 재방문율, 관심고객 수
각 항목 20점 만점, 총 100점 만점.
등급: 위험(44점 이하) / 주의(45~59) / 성장가능(60~74) / 양호(75~89) / 최상위(90+)

[마르코 진단 철학]
① 결과지표가 아닌 선행지표 중심으로 진단합니다
② 결과가 아닌 원인을 찾습니다 (5 Whys: 증상→원인→원인의 원인)
③ 모든 미션은 가설 형태로 제공됩니다: "이것을 하면 이렇게 달라질 것입니다"
④ 미션 실행 결과가 다음 미션의 근거가 됩니다 (가설-검증 루프)
⑤ 단기 결과가 아닌 장기적 비즈니스 개선이 목표입니다

[플랜 정보]
무료: 진단 3회, 히스토리 없음, 신용카드 불필요
건당: ₩9,900/건, Pro와 동일한 진단 품질, 히스토리 저장 없음, 1회성
Pro 월정액: ₩39,000/월, 히스토리 90일 보관·변화 추적, 클라이언트 최대 3곳, 월 15회, 연속 미션, 파일 업로드
Pro 연간: ₩396,000/년, Pro 월정액과 동일, 2개월 무료

[미션의 의미]
마르코의 미션은 단순한 할 일 목록이 아닙니다.
미션 = 가설 검증 실험입니다.
실행 → 선행지표 변화 확인 → 결과에 따라 다음 미션 설계
클라이언트가 성장하면 마르코가 다음 막힌 곳을 찾아 새 미션을 만듭니다.

[리포트 구성 — 무료]

채널 실측 데이터 (결과지표 + 선행지표)
업종 평균 대비 비교

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  // 빠른 질문 버튼 숨기기
  document.getElementById('quickWrap').style.display = 'none';

  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', text);
  messages.push({ role: 'user', content: text });

  showTyping();

  try {
    const response = await fetch('https://marco-chat-api.marco-ai-kr.workers.dev', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-version': '2023-06-01',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: messages
      })
    });

    const data = await response.json();

    if (data.content && data.content[0]) {
      const reply = data.content[0].text;
      hideTyping();
      addMessage('marco', reply);
      messages.push({ role: 'assistant', content: reply });
    } else {
      hideTyping();
      addMessage('marco', '죄송합니다, 일시적인 오류가 발생했습니다. 잠시 후 다시 시도해주세요.', true);
    }
  } catch (err) {
    hideTyping();
    addMessage('marco', '연결에 문제가 발생했습니다. marco.ai.kr@gmail.com으로 문의해주세요.', true);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function sendQuick(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
